<!DOCTYPE html>
<html>
<head>
  <title>PT System</title>
  <style>
    body { font-family: Arial; padding: 20px; background:#f5f5f5; }

    input, button {
      padding: 8px;
      margin: 5px;
    }

    .row { display: flex; gap: 20px; }

    .card {
      background: white;
      padding: 10px;
      margin-top: 10px;
      border-radius: 8px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }

    .section {
      width: 33%;
    }

    .calendar-box {
      background: white;
      padding: 10px;
      margin-top: 10px;
      border-radius: 8px;
    }

    .day {
      border: 1px solid #ddd;
      padding: 5px;
      margin: 3px;
      cursor: pointer;
    }

    .paid { color: green; }
    .unpaid { color: red; }
  </style>
</head>

<body>

<h1>🏋️ PT Simple System</h1>

<div class="row">

  <!-- CLIENTS -->
  <div class="section">
    <h2>Clients</h2>

    <input id="clientName" placeholder="Client name">
    <button onclick="addClient()">Add</button>

    <div id="clients"></div>
  </div>

  <!-- CALENDAR -->
  <div class="section">
    <h2>Calendar</h2>

    <input type="date" id="date">
    <select id="clientSelect"></select>
    <input id="workout" placeholder="Workout / Notes">
    <button onclick="addSession()">Add Session</button>

    <div id="calendar"></div>
  </div>

  <!-- PAYMENTS -->
  <div class="section">
    <h2>Payments</h2>

    <select id="paymentClient"></select>
    <input id="amount" placeholder="Amount RM">
    <button onclick="addPayment()">Add Payment</button>

    <div id="payments"></div>
  </div>

</div>

<script>

let clients = JSON.parse(localStorage.getItem("clients")) || [];
let sessions = JSON.parse(localStorage.getItem("sessions")) || [];
let payments = JSON.parse(localStorage.getItem("payments")) || [];

function save() {
  localStorage.setItem("clients", JSON.stringify(clients));
  localStorage.setItem("sessions", JSON.stringify(sessions));
  localStorage.setItem("payments", JSON.stringify(payments));
  render();
}

function addClient() {
  let name = document.getElementById("clientName").value;
  if (!name) return;

  clients.push({ name });
  document.getElementById("clientName").value = "";
  save();
}

function deleteClient(i) {
  clients.splice(i, 1);
  save();
}

function addSession() {
  let date = document.getElementById("date").value;
  let client = document.getElementById("clientSelect").value;
  let workout = document.getElementById("workout").value;

  if (!date || !client) return;

  sessions.push({ date, client, workout });
  document.getElementById("workout").value = "";
  save();
}

function addPayment() {
  let client = document.getElementById("paymentClient").value;
  let amount = document.getElementById("amount").value;

  if (!client || !amount) return;

  payments.push({ client, amount });
  document.getElementById("amount").value = "";
  save();
}

function render() {

  // CLIENTS
  let cHTML = "";
  clients.forEach((c, i) => {
    cHTML += `
      <div class="card">
        ${c.name}
        <button onclick="deleteClient(${i})">X</button>
      </div>
    `;
  });
  document.getElementById("clients").innerHTML = cHTML;

  // DROPDOWNS
  let options = clients.map(c => `<option>${c.name}</option>`).join("");
  document.getElementById("clientSelect").innerHTML = options;
  document.getElementById("paymentClient").innerHTML = options;

  // SESSIONS (CALENDAR)
  let sHTML = "";
  sessions.forEach(s => {
    sHTML += `
      <div class="calendar-box">
        📅 ${s.date}<br>
        👤 ${s.client}<br>
        🏋️ ${s.workout}
      </div>
    `;
  });
  document.getElementById("calendar").innerHTML = sHTML;

  // PAYMENTS
  let pHTML = "";
  payments.forEach(p => {
    pHTML += `
      <div class="card">
        👤 ${p.client}<br>
        💰 RM ${p.amount}
      </div>
    `;
  });
  document.getElementById("payments").innerHTML = pHTML;
}

render();

</script>

</body>
</html>
