<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PT Calendar System</title>

<style>
body {
  margin: 0;
  font-family: -apple-system, Arial;
  background: #f4f6f8;
}

header {
  background: #111827;
  color: white;
  padding: 12px;
  text-align: center;
  font-weight: 600;
}

/* LAYOUT */
.container {
  padding: 10px;
}

/* CALENDAR */
.calendar {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 6px;
}

.day {
  background: white;
  min-height: 80px;
  border-radius: 10px;
  padding: 6px;
  cursor: pointer;
  border: 1px solid #eee;
}

.day:hover {
  background: #f1f5f9;
}

.date {
  font-weight: bold;
  font-size: 12px;
}

.session {
  font-size: 10px;
  background: #dbeafe;
  margin-top: 3px;
  padding: 2px;
  border-radius: 6px;
}

/* MODAL */
.modal {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.5);
}

.modal-content {
  background: white;
  max-width: 420px;
  margin: 80px auto;
  padding: 15px;
  border-radius: 12px;
}

input, select, button {
  width: 100%;
  padding: 10px;
  margin-top: 8px;
  border-radius: 8px;
  border: 1px solid #ddd;
}

button {
  background: #111827;
  color: white;
  border: none;
}

button.close {
  background: #dc2626;
}

/* CLIENT BAR */
.client-bar {
  display: flex;
  gap: 10px;
  margin-bottom: 10px;
}

.client-bar input {
  flex: 1;
}
</style>

</head>

<body>

<header>🏋️ PT Calendar System (Clean v7)</header>

<div class="container">

<!-- CLIENT ADD -->
<div class="client-bar">
  <input id="clientName" placeholder="Add client">
  <button onclick="addClient()">Add</button>
</div>

<!-- CALENDAR -->
<div class="calendar" id="calendar"></div>

</div>

<!-- MODAL -->
<div class="modal" id="modal">
  <div class="modal-content">

    <h3 id="selectedDate"></h3>

    <select id="clientSelect"></select>
    <input id="notes" placeholder="Workout / Notes">

    <button onclick="saveSession()">Save</button>
    <button class="close" onclick="closeModal()">Close</button>

    <div id="sessionList"></div>

  </div>
</div>

<script>

let clients = JSON.parse(localStorage.getItem("clients")) || [];
let sessions = JSON.parse(localStorage.getItem("sessions")) || [];

let selectedDate = null;

/* SAVE */
function save() {
  localStorage.setItem("clients", JSON.stringify(clients));
  localStorage.setItem("sessions", JSON.stringify(sessions));
  render();
}

/* CLIENTS */
function addClient() {
  let name = document.getElementById("clientName").value;
  if (!name) return;
  clients.push({ name });
  document.getElementById("clientName").value = "";
  save();
}

/* OPEN DAY */
function openDay(date) {
  selectedDate = date;
  document.getElementById("modal").style.display = "block";
  document.getElementById("selectedDate").innerText = date;

  renderModal();
}

/* SAVE SESSION */
function saveSession() {
  let client = document.getElementById("clientSelect").value;
  let notes = document.getElementById("notes").value;

  if (!client) return;

  sessions.push({
    date: selectedDate,
    client,
    notes
  });

  document.getElementById("notes").value = "";

  save();
  renderModal();
}

/* CLOSE */
function closeModal() {
  document.getElementById("modal").style.display = "none";
}

/* MODAL CONTENT */
function renderModal() {

  let html = "";

  sessions.forEach((s,i) => {
    if (s.date === selectedDate) {
      html += `
        <div>
          <b>${s.client}</b> - ${s.notes}
        </div>
      `;
    }
  });

  document.getElementById("sessionList").innerHTML = html;

  document.getElementById("clientSelect").innerHTML =
    clients.map(c => `<option>${c.name}</option>`).join("");
}

/* CALENDAR */
function renderCalendar() {

  let today = new Date();
  let year = today.getFullYear();
  let month = today.getMonth();
  let days = new Date(year, month+1, 0).getDate();

  let html = "";

  for (let i = 1; i <= days; i++) {

    let dateStr = `${year}-${month+1}-${i}`;

    let daySessions = sessions.filter(s => s.date === dateStr);

    html += `
      <div class="day" onclick="openDay('${dateStr}')">
        <div class="date">${i}</div>

        ${daySessions.slice(0,2).map(s =>
          `<div class="session">${s.client}</div>`
        ).join("")}

      </div>
    `;
  }

  document.getElementById("calendar").innerHTML = html;
}

/* INIT */
function render() {
  renderCalendar();
}

render();

</script>

</body>
</html>
