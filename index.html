<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PT System Pro</title>

<style>
body {
  margin: 0;
  font-family: -apple-system, Arial;
  background: #f4f6f8;
}

/* APP LAYOUT */
.app {
  display: flex;
  height: 100vh;
}

/* SIDEBAR */
.sidebar {
  width: 250px;
  background: #0f172a;
  color: white;
  padding: 15px;
}

.sidebar h2 {
  font-size: 16px;
}

.sidebar button {
  width: 100%;
  margin-top: 10px;
  padding: 10px;
  border: none;
  background: #1e293b;
  color: white;
  border-radius: 8px;
  cursor: pointer;
}

/* MAIN */
.main {
  flex: 1;
  padding: 15px;
  overflow: auto;
}

/* MONTH HEADER */
.header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 10px;
}

.header button {
  padding: 8px 12px;
}

/* CALENDAR GRID */
.calendar {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 6px;
}

.day {
  background: white;
  min-height: 90px;
  padding: 6px;
  border-radius: 10px;
  font-size: 11px;
  cursor: pointer;
  border: 1px solid #eee;
}

.day:hover {
  background: #f1f5f9;
}

.date {
  font-weight: bold;
}

.session {
  background: #dbeafe;
  margin-top: 3px;
  font-size: 10px;
  padding: 2px;
  border-radius: 6px;
  cursor: grab;
}

/* MOBILE */
@media(max-width: 768px) {
  .sidebar { display: none; }
}

/* MODAL */
.modal {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.5);
}

.modal-content {
  background: white;
  max-width: 420px;
  margin: 80px auto;
  padding: 15px;
  border-radius: 12px;
}

input, select, button {
  width: 100%;
  padding: 10px;
  margin-top: 6px;
}

button {
  background: #111827;
  color: white;
  border: none;
}
</style>

</head>

<body>

<div class="app">

<!-- SIDEBAR -->
<div class="sidebar">
  <h2>PT MASTER PRO</h2>

  <button onclick="changeView('calendar')">Calendar</button>
  <button onclick="changeView('clients')">Clients</button>
  <button onclick="changeView('progress')">Progress</button>

  <hr>

  <input id="clientName" placeholder="Add client">
  <button onclick="addClient()">Add</button>

  <div id="clientList"></div>
</div>

<!-- MAIN -->
<div class="main">

<div class="header">
  <button onclick="prevMonth()">⬅</button>
  <h3 id="monthTitle"></h3>
  <button onclick="nextMonth()">➡</button>
</div>

<div class="calendar" id="calendar"></div>

</div>

</div>

<!-- MODAL -->
<div class="modal" id="modal">
  <div class="modal-content">

    <h3 id="selectedDate"></h3>

    <select id="clientSelect"></select>
    <input id="workout" placeholder="Workout / Notes">

    <button onclick="saveSession()">Save</button>

    <div id="sessionList"></div>

    <button onclick="closeModal()" style="background:red;margin-top:10px;">Close</button>

  </div>
</div>

<script>

let clients = JSON.parse(localStorage.getItem("clients")) || [];
let sessions = JSON.parse(localStorage.getItem("sessions")) || [];

let current = new Date();
let selectedDate = null;

/* SAVE */
function save() {
  localStorage.setItem("clients", JSON.stringify(clients));
  localStorage.setItem("sessions", JSON.stringify(sessions));
  render();
}

/* CLIENTS */
function addClient() {
  let name = document.getElementById("clientName").value;
  if (!name) return;
  clients.push({ name });
  save();
}

/* MONTH NAV */
function nextMonth() {
  current.setMonth(current.getMonth() + 1);
  render();
}

function prevMonth() {
  current.setMonth(current.getMonth() - 1);
  render();
}

/* OPEN DAY */
function openDay(date) {
  selectedDate = date;
  document.getElementById("modal").style.display = "block";
  document.getElementById("selectedDate").innerText = date;
  renderSessions();
}

/* SESSION */
function saveSession() {
  let client = document.getElementById("clientSelect").value;
  let workout = document.getElementById("workout").value;

  sessions.push({ date: selectedDate, client, workout });
  save();
}

function deleteSession(i) {
  sessions.splice(i, 1);
  save();
}

function renderSessions() {
  let html = "";

  sessions.forEach((s,i) => {
    if (s.date === selectedDate) {
      html += `
        <div>
          <b>${s.client}</b> - ${s.workout}
          <button onclick="deleteSession(${i})">X</button>
        </div>
      `;
    }
  });

  document.getElementById("sessionList").innerHTML = html;

  document.getElementById("clientSelect").innerHTML =
    clients.map(c => `<option>${c.name}</option>`).join("");
}

/* CALENDAR (FULL MONTH 31 DAYS STYLE) */
function renderCalendar() {

  let year = current.getFullYear();
  let month = current.getMonth();

  let daysInMonth = new Date(year, month+1, 0).getDate();

  document.getElementById("monthTitle").innerText =
    current.toLocaleString('default', { month: 'long' }) + " " + year;

  let html = "";

  for (let i = 1; i <= daysInMonth; i++) {

    let dateStr = `${year}-${month+1}-${i}`;

    let daySessions = sessions.filter(s => s.date === dateStr);

    html += `
      <div class="day" onclick="openDay('${dateStr}')">
        <div class="date">${i}</div>

        ${daySessions.slice(0,2).map(s =>
          `<div class="session"
            draggable="true"
            ondragstart="dragStart('${s.date}', '${s.client}', '${s.workout}')">
            ${s.client}
          </div>`
        ).join("")}

      </div>
    `;
  }

  document.getElementById("calendar").innerHTML = html;
}

/* DRAG (SIMPLE VERSION) */
let dragData = null;

function dragStart(date, client, workout) {
  dragData = { date, client, workout };
}

/* DROP INTO DAY */
document.addEventListener("dragover", e => e.preventDefault());

document.addEventListener("drop", e => {
  if (!dragData) return;

  let target = e.target.closest(".day");
  if (!target) return;

  let newDate = target.getAttribute("onclick").match(/'(.*?)'/)[1];

  sessions.push({
    date: newDate,
    client: dragData.client,
    workout: dragData.workout
  });

  save();
  dragData = null;
});

/* PROGRESS (simple future-ready) */
function render() {
  renderCalendar();
}

render();

</script>

</body>
</html>
